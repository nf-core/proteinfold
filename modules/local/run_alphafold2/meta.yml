# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json

name: "run_alphafold2"
description: Run AlphaFold2 to predict protein 3D structures from amino acid sequences within the nf-core/proteinfold pipeline. The module executes AlphaFold2 inference using pretrained models and sequence databases to generate predicted protein structures, multiple sequence alignments, and confidence metrics such as pLDDT and predicted aligned error (PAE).

keywords:
  - protein folding
  - structure prediction
  - deep learning
  - alphafold
  - msa
  - pdb

tools:
  - "alphafold2":
      description: DeepMind's deep learning-based protein structure prediction system that predicts accurate 3D protein structures from amino acid sequences using multiple sequence alignments and structural templates.
      homepage: "https://github.com/google-deepmind/alphafold"
      documentation: "https://github.com/google-deepmind/alphafold"
      tool_dev_url: "https://github.com/google-deepmind/alphafold"
      doi: "https://doi.org/10.1038/s41586-021-03819-2"
      licence: "Apache-2.0"  
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'protein1' ]`
    - fasta:
        type: file
        description: Input FASTA file containing the protein sequence to be folded
        pattern: "*.{fa,fasta}"

  - - db_preset:
        type: string
        description: |
          AlphaFold2 database preset specifying whether full (full_dbs) or reduced databases (reduced_dbs) should be used

  - - alphafold2_model_preset:
        type: string
        description: |
          AlphaFold2 model preset defining the prediction mode (e.g. monomer or multimer)

  - - uniref30_prefix:
        type: string
        description: Prefix used to locate the UniRef30 database

  - - params:
        type: directory
        description: AlphaFold2 model parameter files

  - - bfd:
        type: directory
        description: BFD sequence database used for MSA generation when running with full databases

  - - small_bfd:
        type: directory
        description: Reduced BFD database used for MSA generation when running with reduced databases

  - - mgnify:
        type: directory
        description: MGnify metagenomic sequence database used for MSA generation

  - - pdb70:
        type: directory
        description: PDB70 database used for structural template search in monomer mode

  - - pdb_mmcif:
        type: directory
        description: PDB mmCIF structure files used for structural templates

  - - uniref30:
        type: directory
        description: UniRef30 sequence database used for MSA generation

  - - uniref90:
        type: directory
        description: UniRef90 sequence database used for MSA generation

  - - pdb_seqres:
        type: directory
        description: PDB SeqRes database used for multimer template search

  - - uniprot:
        type: directory
        description: UniProt sequence database used for multimer predictions

output:
  top_ranked_structure:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_alphafold2.pdb":
          type: file
          description: Top-ranked predicted protein structure generated by AlphaFold2
          pattern: "*.pdb"

  structures:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "ranked*.pdb":
          type: file
          description: Predicted protein structures ranked by AlphaFold2 confidence
          pattern: "*.pdb"

  raw_prediction_output:
    - - raw:
          type: directory
          description: Raw AlphaFold2 prediction directory containing intermediate outputs including features, model predictions, and additional structure files

  msa_features:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_alphafold2_msa.tsv":
          type: file
          description: Tab-separated file containing multiple sequence alignment statistics and metrics
          pattern: "*.tsv"

  plddt:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_plddt.tsv":
          type: file
          description: Per-residue pLDDT confidence scores extracted from AlphaFold2 predictions
          pattern: "*.tsv"

  pae:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_pae.tsv":
          type: file
          description: Predicted aligned error matrices representing pairwise residue confidence
          pattern: "*.tsv"

  ptm:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_ptm.tsv":
          type: file
          description: Predicted TM-score confidence metric produced by AlphaFold2
          pattern: "*.tsv"

  iptm:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_iptm.tsv":
          type: file
          description: Interface predicted TM-score metric for multimer predictions
          pattern: "*.tsv"

  versions:
    - - "${task.process}":
          type: string
          description: Name of the executed process
      - "alphafold2":
          type: string
          description: Version of AlphaFold2 used

authors:
  - "@sblaizerwize"

maintainers:
  - "@JoseEspinosa"
