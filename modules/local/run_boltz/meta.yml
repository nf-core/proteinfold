# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json

name: "run_boltz"
description: Run Boltz to predict protein 3D structures from amino acid sequences within the nf-core/proteinfold pipeline. The module executes Boltz inference using pretrained checkpoints and produces predicted structures, multiple sequence alignments, and confidence metrics such as pLDDT and PAE.

keywords:
  - protein folding
  - structure prediction
  - deep learning
  - alphafold-like
  - msa
  - pdb

tools:
  - "boltz":
      description: Deep learning-based protein structure prediction framework that predicts 3D protein structures and associated confidence metrics from amino acid sequences.
      homepage: "https://github.com/jwohlwend/boltz"
      documentation: "https://www.biorxiv.org/content/10.1101/2025.06.14.659707v1"
      tool_dev_url: "https://github.com/jwohlwend/boltz"
      doi: "https://www.biorxiv.org/content/10.1101/2024.11.19.624167v1"
      licence: "MIT"
      identifier: ""

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'protein1' ]`
    - fasta:
        type: file
        description: Input FASTA file containing the protein sequence to be folded
        pattern: "*.{fa,fasta}"

  - - files:
        type: file
        description: Optional cached files used during Boltz prediction

  - - boltz1_conf_ckpt:
        type: file
        description: Boltz pretrained checkpoint used for structure confidence prediction
        pattern: "*.ckpt"

  - - ccd:
        type: file
        description: Chemical component dictionary used during structure generation
        pattern: "*.pkl"

  - - boltz2_aff_ckpt:
        type: file
        description: Boltz pretrained checkpoint used for affinity prediction
        pattern: "*.ckpt"

  - - boltz2_conf_ckpt:
        type: file
        description: Boltz pretrained checkpoint used for confidence prediction
        pattern: "*.ckpt"

  - - mols:
        type: file
        description: Auxiliary molecular data used by Boltz during structure prediction

output:
  top_ranked_structure:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_boltz.pdb":
          type: file
          description: Top-ranked predicted protein structure generated by Boltz
          pattern: "*.pdb"

  structures:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.pdb":
          type: file
          description: Predicted protein structures from Boltz models
          pattern: "*.pdb"

  msa_features:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.npz":
          type: file
          description: Processed multiple sequence alignment features used during prediction
          pattern: "*.npz"

  confidence_metrics:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.json":
          type: file
          description: Prediction confidence metrics produced by Boltz
          pattern: "*.json"

  plddt:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.npz":
          type: file
          description: Per-residue pLDDT confidence scores
          pattern: "*.npz"

  pae:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.npz":
          type: file
          description: Predicted aligned error matrices representing pairwise uncertainty
          pattern: "*.npz"

  versions:
    - - "${task.process}":
          type: string
          description: Name of the executed process
      - "boltz":
          type: string
          description: Version of Boltz used

authors:
  - "@sblaizerwize"
maintainers:
  - "@JoseEspinosa"
