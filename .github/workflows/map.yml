name: workflow JSON generation
# This workflow generates a workflow JSON for the nf-core/proteinfold pipeline using bioflow-insight
on:
  push:
    branches:
      - dev
  pull_request:
  release:
    types: [published]

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: Create workflow JSON using bioflow-insight
    # Only run on push if this is the nf-core dev branch (merged PRs)
    if: "${{ github.event_name != 'push' || (github.event_name == 'push' && github.repository == 'nf-core/proteinfold') }}"
    runs-on: ubuntu-latest

    steps:
      - name: Check out pipeline code
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bioflow-insight==2.0.9

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Run bioflow-insight to generate metro map
        run: |
          bioflow-insight ${GITHUB_WORKSPACE}/main.nf --analysis metroflow --output-dir ${GITHUB_WORKSPACE}/assets

      - name: Upload workflow  JSON artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: workflow JSON file
          path: |
            assets/graphs/*.json
