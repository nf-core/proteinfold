name: metro map generation
# This workflow generates a metro map for the nf-core/proteinfold pipeline using bioflow-insight
on:
  push:
    branches:
      - dev
  pull_request:
  release:
    types: [published]

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: Create map using bioflow-insight
    # Only run on push if this is the nf-core dev branch (merged PRs)
    if: "${{ github.event_name != 'push' || (github.event_name == 'push' && github.repository == 'nf-core/proteinfold') }}"
    runs-on: ubuntu-latest

    steps:
      - name: Check out pipeline code
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bioflow-insight==2.0.9

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2

      - name: Disk space cleanup
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

      - name: Run bioflow-insight to generate metro map
        run: |
          bioflow-insight ${GITHUB_WORKSPACE}/main.nf --analysis metroflow --output-dir metro_map
        
      - name: Upload metro map artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: metro map json file
          path: |
            ./metro_map/*.json
