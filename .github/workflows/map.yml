name: workflow JSON generation
# This workflow generates a workflow JSON for the nf-core/proteinfold pipeline using bioflow-insight
on:
  push:
    pull_request_target:
      branches:
        - dev

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  generate-workflow-json:
    name: Create workflow JSON using bioflow-insight
    # Only run on push if this is the nf-core dev branch (merged PRs)
    if: |
      github.repository_owner == 'nf-core' &&
        github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{ secrets.nf_core_bot_auth_token }}

      # Action runs on the issue comment, so we don't get the PR by default.
      # Use the GitHub CLI to check out the PR:
      - name: Checkout Pull Request
        env:
          GH_TOKEN: ${{ secrets.NF_CORE_BOT_AUTH_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          gh pr checkout $PR_NUMBER

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bioflow-insight==2.0.9

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Run bioflow-insight to generate metro map
        id: generate-json
        run: |
          bioflow-insight ${GITHUB_WORKSPACE}/main.nf --analysis metroflow --output-dir ${GITHUB_WORKSPACE}/assets

      - name: Upload workflow  JSON artifact
        id: upload-artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: workflow JSON file
          path: |
            assets/graphs/*.json

      - name: Commit and push workflow JSON files
        if: steps.generate-json.outcome == 'success' && steps.upload-artifact.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.NF_CORE_BOT_AUTH_TOKEN }}
        run: |
          git config user.email "core@nf-co.re"
          git config user.name "nf-core-bot"
          mkdir -p assets/workflow_jsons
          mv assets/graphs/*.json assets/workflow_jsons/
          git add assets/workflow_jsons
          git status
          git commit -m "[automated] Add workflow JSON artifacts (metro map)"
          git push
